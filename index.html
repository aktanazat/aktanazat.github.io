<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aktan Azat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,200;0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f5f1ec;
      color: #1a1a1a;
      font-family: "Spectral", Georgia, serif;
      font-size: 23px;
      font-weight: 300;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; }

    .page {
      min-height: 100vh;
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 48px;
    }

    .header {
      display: flex;
      align-items: center;
      margin-bottom: 56px;
    }

    h1 {
      font-size: 88px;
      font-weight: 200;
      margin: 0;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .icons {
      display: flex;
      gap: 20px;
      align-items: center;
      margin-left: auto;
    }

    .icons a {
      opacity: 0.3;
      transition: opacity 0.3s ease;
    }

    .icons a:hover { opacity: 1; }

    .icons svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .body {
      display: flex;
      gap: 80px;
      align-items: flex-start;
    }

    .left {
      flex: 1;
      min-width: 0;
    }

    .right {
      flex-shrink: 0;
      width: 220px;
      padding-top: 4px;
    }

    .bio p {
      margin: 0 0 12px;
      color: #3d3831;
    }

    .bio p:last-child { margin-bottom: 0; }

    .email {
      margin-top: 20px;
      font-size: 20px;
      color: #7a7067;
    }

    .email a {
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .email a:hover { color: #1a1a1a; }

    .quote {
      font-style: italic;
      color: #7a7067;
      font-size: 21px;
      line-height: 1.7;
    }

    .quote p { margin: 0; }

    .quote .attribution {
      font-style: normal;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 16px;
      color: #9a9088;
    }

    @media (max-width: 768px) {
      .page {
        padding: 64px 28px;
        justify-content: flex-start;
      }

      .header {
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 40px;
      }

      h1 { font-size: 48px; }

      .body {
        flex-direction: column;
        gap: 36px;
      }

      .right { width: auto; }
    }
  </style>
</head>

    <header class="header">

        <section class="bio">
          <p>Currently at UC Davis.</p>
          <p>Among my interests are LLMs, Pool (virtual and in person), and Languages (human).</p>
        </section>
        <p class="email"><a href="mailto:aktanaazat@gmail.com">aktanaazat@gmail.com</a></p>
